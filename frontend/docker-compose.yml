services:
  # http://localhost:5173 — dev server com hot reload
  dev:
    build:
      context: .
      target: dev
    ports:
      - "5173:5173"
    env_file:
      - .env.local
    volumes:
      - .:/app
      # mantém o node_modules instalado na imagem (não o do host)
      - /app/node_modules
    stdin_open: true
    tty: true

  # http://localhost:8080 — build de produção servido por nginx
  # sobe com: docker compose --profile prod up --build prod
  prod:
    profiles: ["prod"]
    build:
      context: .
      target: prod
    ports:
      - "8080:80"
